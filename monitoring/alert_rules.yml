groups:
  - name: agent_alerts
    rules:
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is above 5% for more than 2 minutes"

      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 3
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High response time"
          description: "95th percentile response time is above 3 seconds"

      - alert: ServiceDown
        expr: up{job="agent-engine"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Agent Engine is down"
          description: "Agent Engine service has been down for more than 1 minute"

      - alert: HighTokenUsage
        expr: increase(tokens_used_total[1h]) > 100000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High token usage"
          description: "Token usage is above 100K in the last hour"

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) < 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Disk space low"
          description: "Disk space is below 10%"
