groups:
  - name: agent_alerts
    rules:
      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(agent_chat_latency_seconds_bucket[5m])) > 3
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "响应时间过慢：P95 > 3s"
          description: "当前 P95 延迟 {{ $value }}s，阈值 3s"

      - alert: HighErrorRate
        expr: rate(agent_chat_request_errors_total[5m]) / rate(agent_chat_requests_total[5m]) > 0.05
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "错误率超过 5%"
          description: "当前错误率 {{ $value | humanizePercentage }}"

      - alert: TenantQuotaWarning
        expr: agent_tenant_quota_usage_ratio > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "租户配额使用超过 85%：{{ $labels.tenant_id }}"
          description: "租户 {{ $labels.tenant_id }} 配额使用率 {{ $value }}"

      - alert: NoChatActivity
        expr: increase(agent_chat_requests_total[1h]) == 0
        for: 30m
        labels:
          severity: info
        annotations:
          summary: "过去30分钟无对话活动"
          description: "服务可能异常或无流量"
