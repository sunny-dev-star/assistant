version: '3.8'

services:
  # 核心引擎
  agent-engine:
    build: ./agent-engine
    container_name: agent-engine
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://agent:agent123@postgres:5432/agent_db
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - ENV=production
    volumes:
      - ./skills:/app/skills
      - ./logs:/app/logs
    depends_on:
      - postgres
      - redis
      - minio
    networks:
      - agent-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 数据库
  postgres:
    image: postgres:15-alpine
    container_name: agent-postgres
    environment:
      - POSTGRES_USER=agent
      - POSTGRES_PASSWORD=agent123
      - POSTGRES_DB=agent_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - agent-network
    restart: unless-stopped

  # 向量数据库扩展
  pgvector:
    image: pgvector/pgvector:pg15
    container_name: agent-pgvector
    environment:
      - POSTGRES_USER=agent
      - POSTGRES_PASSWORD=agent123
      - POSTGRES_DB=agent_vector_db
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - agent-network
    restart: unless-stopped

  # 缓存
  redis:
    image: redis:7-alpine
    container_name: agent-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - agent-network
    restart: unless-stopped

  # 文件存储
  minio:
    image: minio/minio:latest
    container_name: agent-minio
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    networks:
      - agent-network
    restart: unless-stopped

  # 监控 - Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: agent-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - agent-network
    restart: unless-stopped

  # 监控 - Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: agent-grafana
    volumes:
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - agent-network
    restart: unless-stopped

  # Nginx reverse proxy with auto HTTPS
  nginx:
    image: nginx:alpine
    container_name: agent-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - ./nginx/www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    depends_on:
      - agent-engine
      - certbot
    networks:
      - agent-network
    restart: unless-stopped

  # Certbot - auto HTTPS certificate renewal
  certbot:
    image: certbot/certbot
    container_name: agent-certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do
               certbot renew --webroot --webroot-path /var/www/certbot;
               sleep 12h & wait $${!};
             done"
    networks:
      - agent-network
    restart: unless-stopped

  # Database Backup
  backup:
    image: alpine:latest
    container_name: agent-backup
    volumes:
      - ./scripts/backup.sh:/backup.sh:ro
      - backup_data:/backups
    entrypoint: >
      sh -c "apk add --no-cache postgresql-client dcron &&
             echo '0 2 * * * /backup.sh' | crontab - &&
             crond -f"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=agent
      - DB_NAME=agent_db
      - BACKUP_DIR=/backups
      - RETENTION_DAYS=30
    depends_on:
      - postgres
    networks:
      - agent-network
    restart: unless-stopped


volumes:
  postgres_data:
  pgvector_data:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data:

networks:
  agent-network:
    driver: bridge
