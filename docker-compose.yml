version: '3.8'

services:
  # ============================================
  # Core Engine
  # ============================================
  agent-engine:
    build:
      context: .
      dockerfile: src/Dockerfile
    container_name: agent-engine
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://agent:${POSTGRES_PASSWORD:-changeme}@postgres:5432/agent_db
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_API_URL=${DEEPSEEK_API_URL:-https://api.deepseek.com/v1}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - AUTH_ENABLED=${AUTH_ENABLED:-false}
      - MCP_SERVERS=${MCP_SERVERS:-}
      - MCP_ENABLED=${MCP_ENABLED:-false}
      - ENV=production
    volumes:
      - ./skills:/app/skills
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - agent-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # BFF (Backend For Frontend) - NEW
  # ============================================
  bff:
    build:
      context: .
      dockerfile: src/Dockerfile
    container_name: agent-bff
    command: uvicorn assistant.bff.main:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql+asyncpg://agent:${POSTGRES_PASSWORD:-changeme}@postgres:5432/agent_db
      - REDIS_URL=redis://redis:6379/1
      - CORE_API_URL=http://agent-engine:8000
      - INTERNAL_TOKEN=${INTERNAL_TOKEN:-dev-internal-token}
      - BFF_JWT_SECRET=${BFF_JWT_SECRET:-change-me-in-production}
      - SMS_PROVIDER=${SMS_PROVIDER:-}
      - SMS_API_KEY=${SMS_API_KEY:-}
      - ENV=production
    depends_on:
      agent-engine:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - agent-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # Database (PostgreSQL + pgvector unified)
  # ============================================
  postgres:
    image: pgvector/pgvector:pg15
    container_name: agent-postgres
    environment:
      - POSTGRES_USER=agent
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=agent_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - agent-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agent_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================
  # Cache
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: agent-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - agent-network
    restart: unless-stopped

  # ============================================
  # Object Storage
  # ============================================
  minio:
    image: minio/minio:latest
    container_name: agent-minio
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    networks:
      - agent-network
    restart: unless-stopped

  # ============================================
  # Monitoring - Prometheus
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: agent-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - agent-network
    restart: unless-stopped

  # ============================================
  # Monitoring - Grafana
  # ============================================
  grafana:
    image: grafana/grafana:latest
    container_name: agent-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - agent-network
    restart: unless-stopped

  # ============================================
  # Nginx reverse proxy + HTTPS
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: agent-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - certbot_webroot:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
      - ./frontend/dist:/var/www/frontend
    depends_on:
      - agent-engine
      - bff
    networks:
      - agent-network
    restart: unless-stopped

  # ============================================
  # Certbot - auto HTTPS renewal
  # ============================================
  certbot:
    image: certbot/certbot
    container_name: agent-certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do
               certbot renew --webroot --webroot-path /var/www/certbot;
               sleep 12h & wait $${!};
             done"
    networks:
      - agent-network
    restart: unless-stopped

  # ============================================
  # Database auto backup
  # ============================================
  backup:
    image: alpine:latest
    container_name: agent-backup
    volumes:
      - ./scripts/backup.sh:/backup.sh:ro
      - backup_data:/backups
    entrypoint: >
      sh -c "apk add --no-cache postgresql-client dcron &&
             echo '0 2 * * * /backup.sh' >> /etc/crontabs/root &&
             crond -f"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=agent
      - DB_NAME=agent_db
      - BACKUP_DIR=/backups
      - RETENTION_DAYS=30
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - agent-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data:
  backup_data:
  certbot_certs:
  certbot_webroot:

networks:
  agent-network:
    driver: bridge
